services:
  mermaid:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    working_dir: /mermaid
    mem_limit: '8G'
    env_file:
      - .env
    volumes:
      - ./:/mermaid
      - root_cache:/root/.cache
      - root_local:/root/.local
      - root_npm:/root/.npm
      - /tmp:/tmp
    ports:
      - ${MERMAID_PORT}:${MERMAID_PORT}
      - 3333:3333
  cypress:
    image: cypress/included:14.0.3
    stdin_open: true
    tty: true
    working_dir: /mermaid
    mem_limit: '2G'
    entrypoint: cypress
    environment:
      - DISPLAY
    volumes:
      - ./:/mermaid
      - pnpm_store:/root/.local/share/pnpm
      - root_cache:/root/.cache
      - root_local:/root/.local
      - root_npm:/root/.npm
      - /tmp:/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host

volumes:
  pnpm_store:
  root_cache:
  root_local:
  root_npm:
